name: Build and Commit Bundle

on:
  push:
    branches:
      - main

jobs:
  build-and-commit:
    name: Build Bundle and Commit to Main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build the bundle
        run: npm run build

      - name: Commit built bundle
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatically build and bundle yet-another-media-player.js"
          file_pattern: "yet-another-media-player.js"
          add_options: "-f" # Force add because it's ignored in .gitignore
